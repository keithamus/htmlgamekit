---
layout: demo
title: Score Form Demo
permalink: /demos/score-form/
style: |
  :root { --game-accent: #fbbf24; }
---

<game-shell
  id="game"
  rounds="3"
  between-delay="300"
  score-url="https://scores.htmlgamekit.dev"
  game-id="demo-score-form"
>
  <div when-some-scene="intro" data-overlay>
    <h1>Score Form Demo</h1>
    <p>Play 3 rounds, then submit your score.</p>
    <button commandfor="game" command="--start" autofocus>Start</button>
  </div>

  <game-timer
    when-some-scene="playing between paused"
    duration="5"
  ></game-timer>

  <div when-some-scene="playing between paused">
    <demo-target></demo-target>
  </div>

  <div when-some-scene="result" data-overlay>
    <h1>Done!</h1>
    <game-result-stat label="Score"></game-result-stat>
    <game-score-form></game-score-form>
    <button commandfor="game" command="--restart" autofocus>Again</button>
  </div>
</game-shell>
<script type="module" src="{{ site.baseurl }}/demos/demo-init.js"></script>
