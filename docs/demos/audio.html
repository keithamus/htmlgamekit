---
layout: demo
title: Audio Demo
permalink: /demos/audio/
style: |
  :root { --game-accent: #6ee7b7; }
---

<game-shell id="game" rounds="5" between-delay="400">
  <div when-some-scene="intro" data-overlay>
    <h1>Audio Demo</h1>
    <p>Click the dot. Listen to the chimes.</p>
    <button commandfor="game" command="--start" autofocus>Start</button>
  </div>

  <game-audio>
    <game-sample
      trigger="pass"
      type="marimba"
      notes="523:0,659:0.07,784:0.14"
      gain="0.3"
    ></game-sample>
    <game-sample
      trigger="fail"
      type="marimba"
      notes="330:0,262:0.08,220:0.16"
      gain="0.25"
    ></game-sample>
    <game-sample
      trigger="start"
      type="marimba"
      notes="262:0,330:0.08,392:0.16"
      gain="0.3"
    ></game-sample>
    <game-sample
      trigger="complete"
      type="marimba"
      notes="392:0,523:0.12,659:0.24,784:0.36"
      gain="0.35"
    ></game-sample>
  </game-audio>

  <game-timer duration="5"></game-timer>

  <div>
    <demo-target></demo-target>
  </div>

  <div when-some-scene="result" data-overlay>
    <h1>Done!</h1>
    <game-result-stat label="Score"></game-result-stat>
    <button commandfor="game" command="--restart" autofocus>Again</button>
  </div>
</game-shell>
<script type="module" src="{{ site.baseurl }}/demos/demo-init.js"></script>
