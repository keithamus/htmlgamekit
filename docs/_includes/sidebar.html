<nav class="sidebar" aria-label="Documentation">
  <a href="{{ site.baseurl }}/" class="sidebar-logo">HTMLGameKit</a>
  <ul class="sidebar-nav">
    {% for item in nav %}
      {% if item.section %}
        <li class="sidebar-section">{{ item.section }}</li>
      {% else %}
        <li>
          <a href="{{ site.baseurl }}{{ item.url }}"{% if page.url == item.url %} aria-current="page"{% endif %}>
            {{ item.title }}
          </a>
          {% if item.children %}
            <ul class="sidebar-children">
              {% for child in item.children %}
                <li>
                  <a href="{{ site.baseurl }}{{ child.url }}"{% if page.url == child.url %} aria-current="page"{% endif %}>
                    {{ child.title }}
                  </a>
                </li>
              {% endfor %}
            </ul>
          {% endif %}
        </li>
      {% endif %}
    {% endfor %}
  </ul>
</nav>
